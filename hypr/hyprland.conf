monitor = eDP-1, 1920x1080@60, 0x0, 1

# super key
$mod = SUPER

exec-once = ghostty
exec-once = waybar
exec-once = mako
exec-once = nm-applet --indicator
exec-once = swww init
exec-once = sleep 1 && swww img ~/Pictures/wallpaper/astronaut2.png --transition-type grow --transition-duration 1.5

# ───────── shortcuts ─────────
bind = $mod, RETURN, exec, ghostty
bind = $mod, Q, killactive
bind = $mod, E, exec, nautilus
bind = $mod, SPACE, exec, rofi -show drun
bind = $mod SHIFT, L, exec, wlogout
bind = $mod, L, exec, hyprlock
bind = $mod, F, exec, firefox

# clipboard (FIXED)
bind = $mod, V, exec, wl-paste

# desktop
# move window
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d
bindm = $mod, mouse:272, movewindow
# move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
# resizing window
bindm = $mod, mouse:273, resizewindow

# workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, TAB, workspace, m+1
bind = $mod SHIFT, TAB, workspace, m-1
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
workspace = 6, persistent:true

# Move focus with mainMod + arrow keys
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# floating window
bind = $mod SHIFT, F, togglefloating
# ───────── Apparence ─────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    # Enable resizing by dragging borders
    resize_on_border = true
}

decoration {
    rounding = 8

    blur {
        enabled = true
        size = 10
        passes = 3
        new_optimizations = true
    }
}

animations {
    enabled = yes

    bezier = smoothOut, 0.25, 1, 0.5, 1
    bezier = easeOutBack, 0.34, 1.3, 0.64, 1
    animation = windows, 1, 7, easeOutBack
    animation = workspaces, 1, 6, smoothOut
    animation = windowsIn, 1, 4, easeOutBack, slide
    animation = windowsOut, 1, 4, easeOutBack, slide
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
}
