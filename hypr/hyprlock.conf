general {
    hide_cursor = true
}

# ───────── BACKGROUND CINEMATIC ─────────
background {
    monitor =
    path = screenshot
    blur_passes = 5
    blur_size = 12
    noise = 0.02
    contrast = 1.2
    brightness = 0.8
    vibrancy = 0.2
}

# ───────── DARK OVERLAY ─────────
shape {
    monitor =
    size = 100%, 100%
    color = rgba(0, 0, 0, 0.45)
    position = 0, 0
}

# ───────── TIME DISPLAY ─────────
label {
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 80
    color = rgba(255, 255, 255, 0.9)
    position = 0, 120
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +'%A %d %B')"
    font_size = 20
    color = rgba(200, 200, 200, 0.8)
    position = 0, 40
    halign = center
    valign = center
}

# ───────── INPUT FIELD (STYLE MODERNE) ─────────
input-field {
    size = 320, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15

    outer_color = rgba(137, 180, 250, 0.8)
    inner_color = rgba(17, 17, 27, 0.6)
    font_color = rgba(255, 255, 255, 0.9)

    fade_on_empty = false
    placeholder_text = Enter password...

    position = 0, -80
    halign = center
    valign = center
}
